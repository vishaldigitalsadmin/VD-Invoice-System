<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice System Login</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="login-page">

        <!-- LEFT BRAND SIDE -->
        <div class="login-left">

            <img src="/logo.png" alt="Logo" class="login-logo">

            <h1>
                Vishal Digitals
            </h1>

            <p>
                Invoice Management System
            </p>

        </div>


        <!-- RIGHT LOGIN SIDE -->
        <div class="login-right">

            <div class="login-card">

                <div class="google-badge">
                    Google Secured Login
                </div>

                <h2>
                    Welcome Back
                </h2>

                <p class="login-subtitle">
                    Authorized access only. Continue securely using your Google account.
                </p>


                <a href="/auth/google" class="google-link">

                    <button class="google-btn">

                        <svg width="24" height="24" viewBox="0 0 48 48">
                            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.21 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4c-7.682 0-14.318 4.337-17.694 10.691z"/>
                            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.19 0-9.626-3.327-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.085 5.571.001-.001 6.19 5.238 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                        </svg>

                        Continue with Google

                    </button>

                </a>


                <div class="secure-text">
                    Protected Internal Portal
                </div>

            </div>

        </div>

    </div>

</body>
</html>
