<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice System Login</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{

            min-height: 100vh;

            background: #f4f7fb;

            overflow-x: hidden;
        }

        .login-page{

            min-height: 100vh;

            display: flex;
        }


        /* =========================
           LEFT SIDE
        ========================= */

        .login-left{

            width: 40%;

            background:
            linear-gradient(135deg, #020617, #0f172a);

            color: white;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 40px;

            text-align: center;
        }

        .login-logo{

            width: 180px;
            height: 180px;

            object-fit: contain;

            margin-bottom: 25px;

            border-radius: 50%;

            background: white;

            padding: 10px;
        }

        .login-left h1{

            font-size: 52px;

            line-height: 1.1;

            margin-bottom: 15px;
        }

        .login-left p{

            font-size: 20px;

            opacity: 0.85;
        }



        /* =========================
           RIGHT SIDE
        ========================= */

        .login-right{

            width: 60%;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 40px;
        }

        .login-card{

            width: 100%;
            max-width: 520px;

            background: white;

            padding: 50px;

            border-radius: 28px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.08);

            text-align: center;
        }

        .google-badge{

            display: inline-block;

            background: #eef2ff;

            color: #2563eb;

            padding: 12px 22px;

            border-radius: 50px;

            font-size: 14px;

            font-weight: bold;

            margin-bottom: 25px;
        }

        .login-card h2{

            font-size: 52px;

            line-height: 1.1;

            color: #0f172a;

            margin-bottom: 20px;
        }

        .login-subtitle{

            font-size: 18px;

            color: #64748b;

            line-height: 1.8;

            margin-bottom: 40px;
        }

        .google-link{

            text-decoration: none;
        }

        .google-btn{

            width: 100%;

            border: none;

            background: #111827;

            color: white;

            padding: 18px 24px;

            border-radius: 18px;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;

            transition: 0.3s;
        }

        .google-btn:hover{

            transform: translateY(-2px);

            background: #000;
        }

        .secure-text{

            margin-top: 30px;

            font-size: 15px;

            color: #94a3b8;
        }



        /* =========================
           MOBILE RESPONSIVE
        ========================= */

        /* =========================
   MOBILE RESPONSIVE
========================= */

@media screen and (max-width: 900px){

    body{

        background: #f4f7fb;
    }

    .login-page{

        flex-direction: column;

        min-height: auto;
    }

    .login-left{

        width: 100%;

        min-height: auto;

        padding: 50px 25px;

        border-bottom-left-radius: 35px;
        border-bottom-right-radius: 35px;
    }

    .login-logo{

        width: 120px;
        height: 120px;

        margin-bottom: 20px;
    }

    .login-left h1{

        font-size: 42px;

        margin-bottom: 10px;
    }

    .login-left p{

        font-size: 18px;
    }

    .login-right{

        width: 100%;

        padding: 25px;

        margin-top: -25px;
    }

    .login-card{

        width: 100%;

        padding: 35px 25px;

        border-radius: 28px;

        background: white;

        box-shadow:
        0 10px 35px rgba(0,0,0,0.08);
    }

    .login-card h2{

        font-size: 38px;

        margin-bottom: 15px;
    }

    .login-subtitle{

        font-size: 16px;

        line-height: 1.7;

        margin-bottom: 30px;
    }

    .google-btn{

        width: 100%;

        padding: 16px;

        font-size: 16px;
    }

    .secure-text{

        font-size: 14px;
    }

}



@media screen and (max-width: 500px){

    .login-left h1{

        font-size: 34px;
    }

    .login-card h2{

        font-size: 32px;
    }

}

    </style>

</head>
<body>

    <div class="login-page">

        <!-- LEFT BRAND SIDE -->
        <div class="login-left">

            <img src="/logo.png" alt="Logo" class="login-logo">

            <h1>
                Vishal Digitals
            </h1>

            <p>
                Invoice Management System
            </p>

        </div>

        <!-- RIGHT LOGIN SIDE -->
        <div class="login-right">

            <div class="login-card">

                <div class="google-badge">
                    Google Secured Login
                </div>

                <h2>
                    Welcome Back
                </h2>

                <p class="login-subtitle">
                    Authorized access only. Continue securely using your Google account.
                </p>

                <a href="/auth/google" class="google-link">

                    <button class="google-btn">

                        <svg width="24" height="24" viewBox="0 0 48 48">
                            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.21 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.27 4 24 4c-7.682 0-14.318 4.337-17.694 10.691z"/>
                            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.19 0-9.626-3.327-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.085 5.571.001-.001 6.19 5.238 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                        </svg>

                        Continue with Google

                    </button>

                </a>

                <div class="secure-text">
                    Protected Internal Portal
                </div>

            </div>

        </div>

    </div>

</body>
</html>
