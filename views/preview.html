<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Preview</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>

        body{
            background:#f1f5f9;
            font-family: Arial, Helvetica, sans-serif;
            padding:40px;
        }

        .preview-wrapper{
            max-width:1000px;
            margin:auto;
        }

        .invoice-card{
            background:white;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 20px 60px rgba(0,0,0,0.08);
        }

        .invoice-header{
            padding:35px 45px;
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            border-bottom:1px solid #e5e7eb;
        }

        .header-left{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .invoice-logo{
            width:90px;
            height:90px;
            object-fit:contain;
            border-radius:18px;
        }

        .invoice-title{
            font-size:52px;
            font-weight:800;
            color:#0f172a;
            letter-spacing:-2px;
        }

        .header-right{
            text-align:right;
        }

        .header-right p{
            margin:8px 0;
            font-size:16px;
            color:#475569;
        }

        .invoice-body{
            padding:45px;
        }

        .invoice-section{
            margin-bottom:45px;
        }

        .invoice-section h2{
            font-size:32px;
            margin-bottom:25px;
            color:#0f172a;
        }

        .invoice-table{
            width:100%;
            border-collapse:collapse;
        }

        .invoice-table tr{
            border-bottom:1px solid #f1f5f9;
        }

        .invoice-table td{
            padding:18px;
            font-size:18px;
        }

        .invoice-table td:first-child{
            width:35%;
            font-weight:700;
            color:#0f172a;
            background:#f8fafc;
        }

        .invoice-table td:last-child{
            color:#334155;
        }

        .description-box{
            background:#f8fafc;
            padding:24px;
            border-radius:18px;
            line-height:1.8;
            color:#334155;
            font-size:17px;
        }

        .preview-actions{
            display:flex;
            justify-content:space-between;
            gap:20px;
            margin-top:40px;
        }

        .preview-actions button{
            flex:1;
            padding:18px;
            border:none;
            border-radius:18px;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
            transition:0.25s;
        }

        .edit-btn{
            background:#e2e8f0;
            color:#0f172a;
        }

        .confirm-btn{
            background:#0f172a;
            color:white;
        }

        .preview-actions button:hover{
            transform:translateY(-2px);
        }

    </style>

</head>
<body>

<div class="preview-wrapper">

    <div class="invoice-card">

        <!-- HEADER -->

        <div class="invoice-header">

            <div class="header-left">

                <img
                    src="/logo.png"
                    class="invoice-logo"
                >

                <div class="invoice-title">
                    INVOICE
                </div>

            </div>


            <div class="header-right">

                <p>
                    <strong>Bill Number:</strong>
                    <span id="previewBillNumber"></span>
                </p>

                <p>
                    <strong>Date:</strong>
                    <span id="previewDate"></span>
                </p>

            </div>

        </div>


        <!-- BODY -->

        <div class="invoice-body">

            <!-- CUSTOMER -->

            <div class="invoice-section">

                <h2>Customer Details</h2>

                <table class="invoice-table">

                    <tr>
                        <td>Customer Name</td>
                        <td id="previewCustomerName"></td>
                    </tr>

                    <tr>
                        <td>Mobile</td>
                        <td id="previewMobile"></td>
                    </tr>

                    <tr>
                        <td>Whatsapp</td>
                        <td id="previewWhatsapp"></td>
                    </tr>

                    <tr>
                        <td>Sector</td>
                        <td id="previewSector"></td>
                    </tr>

                </table>

            </div>


            <!-- BILLING -->

            <div class="invoice-section">

                <h2>Order Details</h2>

                <table class="invoice-table">

                    <tr>
                        <td>Item</td>
                        <td id="previewItem"></td>
                    </tr>

                    <tr>
                        <td>Size</td>
                        <td id="previewSize"></td>
                    </tr>

                    <tr>
                        <td>Quantity</td>
                        <td id="previewQuantity"></td>
                    </tr>

                    <tr>
                        <td>Total Bill</td>
                        <td id="previewTotal"></td>
                    </tr>

                    <tr>
                        <td>Advance Payment</td>
                        <td id="previewAdvance"></td>
                    </tr>

                </table>

            </div>


            <!-- DESCRIPTION -->

            <div class="invoice-section">

                <h2>Description</h2>

                <div
                    class="description-box"
                    id="previewDescription"
                ></div>

            </div>


            <!-- ACTIONS -->

            <div class="preview-actions">

                <button
                    class="edit-btn"
                    onclick="history.back()"
                >
                    ← Edit Invoice
                </button>


                <form
                    action="/submit"
                    method="POST"
                    id="confirmForm"
                    enctype="multipart/form-data"
                    style="flex:1;"
                >

                    <input type="hidden" name="customerName" id="hiddenCustomerName">
                    <input type="hidden" name="mobile" id="hiddenMobile">
                    <input type="hidden" name="whatsapp" id="hiddenWhatsapp">
                    <input type="hidden" name="sector" id="hiddenSector">
                    <input type="hidden" name="item" id="hiddenItem">
                    <input type="hidden" name="size" id="hiddenSize">
                    <input type="hidden" name="quantity" id="hiddenQuantity">
                    <input type="hidden" name="totalBill" id="hiddenTotalBill">
                    <input type="hidden" name="advancePayment" id="hiddenAdvancePayment">
                    <input type="hidden" name="description" id="hiddenDescription">

                    <input
                        type="file"
                        name="designImages"
                        multiple
                        required
                        style="margin-bottom:15px;"
                    >
            
                    <button
                        type="submit"
                        class="confirm-btn"
                        style="width:100%;"
                    >
                        Confirm & Send ✓
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


<script>

const data =
    JSON.parse(
        localStorage.getItem("invoiceData")
    );

if(data){

    document.getElementById("previewCustomerName").innerText =
        data.customerName || "";

    document.getElementById("previewMobile").innerText =
        data.mobile || "";

    document.getElementById("previewWhatsapp").innerText =
        data.whatsapp || "";

    document.getElementById("previewSector").innerText =
        data.sector || "";

    document.getElementById("previewItem").innerText =
        data.item || "";

    document.getElementById("previewSize").innerText =
        data.size || "";

    document.getElementById("previewQuantity").innerText =
        data.quantity || "";

    document.getElementById("previewTotal").innerText =
        "₹ " + (data.totalBill || "0");

    document.getElementById("previewAdvance").innerText =
        "₹ " + (data.advancePayment || "0");

    document.getElementById("previewDescription").innerText =
        data.description || "";

    document.getElementById("previewBillNumber").innerText =
        "VD-" + Date.now();

    document.getElementById("previewDate").innerText =
        new Date().toLocaleDateString();



    // hidden inputs

    document.getElementById("hiddenCustomerName").value =
        data.customerName || "";

    document.getElementById("hiddenMobile").value =
        data.mobile || "";

    document.getElementById("hiddenWhatsapp").value =
        data.whatsapp || "";

    document.getElementById("hiddenSector").value =
        data.sector || "";

    document.getElementById("hiddenItem").value =
        data.item || "";

    document.getElementById("hiddenSize").value =
        data.size || "";

    document.getElementById("hiddenQuantity").value =
        data.quantity || "";

    document.getElementById("hiddenTotalBill").value =
        data.totalBill || "";

    document.getElementById("hiddenAdvancePayment").value =
        data.advancePayment || "";

    document.getElementById("hiddenDescription").value =
        data.description || "";

}

</script>

</body>
</html>
